<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Medicine Stock — Drugs Table</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; }
      th { background: #f4f4f4; text-align: left; }
      tr:nth-child(even){ background: #fbfbfb; }
      .muted { color: #666; font-size: 0.9em }
      #loading { margin-bottom: 12px }
    </style>
  </head>
  <body>
    <h1>Medicine Stock — Drugs</h1>
    <div id="loading">Loading data…</div>
    <div class="muted">Source: <code>/drugs</code> (JSON)</div>
    <table id="drugs-table" aria-live="polite">
      <thead>
        <tr>
          <th>ID</th>
          <th>Drug Name</th>
          <th>Category</th>
          <th>Lot Number</th>
          <th>Quantity</th>
          <th>Min Stock</th>
          <th>Expiry Date</th>
          <th>Created At</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      async function loadDrugs() {
        const loadingEl = document.getElementById('loading');
        try {
          const res = await fetch('/drugs');
          if (!res.ok) throw new Error('Network response was not ok');
          const json = await res.json();
          const tbody = document.querySelector('#drugs-table tbody');
          tbody.innerHTML = '';
          json.data.forEach(d => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${d.id}</td>
              <td>${escapeHtml(d.drug_name)}</td>
              <td>${escapeHtml(d.category)}</td>
              <td>${escapeHtml(d.lot_number)}</td>
              <td>${d.quantity}</td>
              <td>${d.min_stock}</td>
              <td>${escapeHtml(d.expiry_date)}</td>
              <td>${escapeHtml(d.created_at)}</td>
            `;
            tbody.appendChild(tr);
          });
          loadingEl.textContent = `Loaded ${json.count} rows`;
        } catch (err) {
          loadingEl.textContent = 'Error loading data: ' + err.message;
        }
      }

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[s]));
      }

      window.addEventListener('DOMContentLoaded', loadDrugs);
    </script>
  </body>
</html>
