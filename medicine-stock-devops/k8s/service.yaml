apiVersion: v1
kind: Service
metadata:
  name: medicine-stock-service
  namespace: medicine-stock
  labels:
    app: medicine-stock
    version: v1.0.0
  annotations:
    description: "Medicine Stock API Service"
    contact: "DevOps Team"

spec:
  type: NodePort
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30081
    protocol: TCP
    name: http
  
  selector:
    app: medicine-stock
  
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: medicine-stock-internal
  namespace: medicine-stock
  labels:
    app: medicine-stock
    version: internal

spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: medicine-stock

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medicine-stock-ingress
  namespace: medicine-stock
  annotations:
    kubernetes.io/ingress.class: "nginx"

spec:
  rules:
  - host: medicine-stock.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: medicine-stock-service
            port:
              number: 5000

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medicine-stock-netpol
  namespace: medicine-stock

spec:
  podSelector:
    matchLabels:
      app: medicine-stock
  
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: medicine-stock
    ports:
    - protocol: TCP
      port: 5000
  
  - from:
    - namespaceSelector:
        matchLabels:
          name: prometheus
    ports:
    - protocol: TCP
      port: 5000
  
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  
  - to:
    - namespaceSelector:
        matchLabels:
          name: medicine-stock
  
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80