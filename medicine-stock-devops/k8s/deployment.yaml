apiVersion: apps/v1
kind: Deployment
metadata:
  name: medicine-stock
  namespace: medicine-stock
  labels:
    app: medicine-stock
    version: v1.0.0
  annotations:
    description: "Medicine Stock and Expiry Monitoring API"
    owner: "DevOps Team"

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  selector:
    matchLabels:
      app: medicine-stock
  
  template:
    metadata:
      labels:
        app: medicine-stock
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    
    spec:
      serviceAccountName: medicine-stock-sa
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
      - name: medicine-stock
        image: medicine-stock:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: medicine-stock-config
        - secretRef:
            name: medicine-stock-secrets
        
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 30
        
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
            ephemeral-storage: 100Mi
          limits:
            cpu: 500m
            memory: 512Mi
            ephemeral-storage: 500Mi
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
      
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 200Mi
      - name: app-data
        emptyDir:
          sizeLimit: 500Mi
      
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - medicine-stock
              topologyKey: kubernetes.io/hostname

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: medicine-stock-pdb
  namespace: medicine-stock

spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: medicine-stock

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medicine-stock-hpa
  namespace: medicine-stock

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medicine-stock
  
  minReplicas: 2
  maxReplicas: 5
  
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30