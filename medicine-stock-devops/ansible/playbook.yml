---
# Ansible Playbook for Medicine Stock DevOps
# Purpose: Configure Kubernetes environment, setup monitoring, deploy application
- name: Medicine Stock Kubernetes Setup
  hosts: kubernetes
  become: no
  gather_facts: yes

  vars:
    namespace: "medicine-stock"  
    docker_image: "medicine-stock:latest"
    app_name: "medicine-stock-api"
    prometheus_namespace: "prometheus"
    terraform_path: "{{ playbook_dir }}/../terraform"
    
  pre_tasks:
    - name: Display playbook information
      debug:
        msg:
          - "Playbook: Medicine Stock DevOps Configuration"
          - "Target: {{ inventory_hostname }}"
          - "Namespace: {{ namespace }}"
                                        
  tasks:
    # ============================================
    # 1. Check Prerequisites
    # ============================================
    - name: Check kubectl availability
      command: kubectl version --client
      register: kubectl_version
      changed_when: false
      ignore_errors: yes

    - name: Display kubectl version
      debug:
        msg: "kubectl: {{ kubectl_version.stdout }}"
      when: kubectl_version.rc == 0

    - name: Check Kubernetes cluster connectivity
      command: kubectl cluster-info
      register: k8s_cluster_info
      changed_when: false
      ignore_errors: yes

    - name: Display cluster info
      debug:
        msg: "{{ k8s_cluster_info.stdout_lines }}"
      when: k8s_cluster_info.rc == 0

    # ============================================
    # 2. Initialize Terraform
    # ============================================
    - name: Initialize Terraform
      command: terraform init
      args:
        chdir: "{{ terraform_path }}"
      register: terraform_init
      changed_when: "'Terraform initialized' in terraform_init.stdout or 'already been initialized' in terraform_init.stdout"

    - name: Validate Terraform configuration
      command: terraform validate
      args:
        chdir: "{{ terraform_path }}"
      register: terraform_validate

    - name: Display Terraform validation result
      debug:
        msg: "{{ terraform_validate.stdout }}"

    # ============================================
    # 3. Plan and Apply Terraform
    # ============================================
    - name: Terraform plan
      command: terraform plan -out=tfplan
      args:
        chdir: "{{ terraform_path }}"
      register: terraform_plan
      changed_when: "'will be created' in terraform_plan.stdout or 'will be modified' in terraform_plan.stdout"

    - name: Terraform apply
      command: terraform apply -auto-approve tfplan
      args:
        chdir: "{{ terraform_path }}"
      register: terraform_apply

    - name: Get Terraform outputs
      command: terraform output -json
      args:
        chdir: "{{ terraform_path }}"
      register: terraform_outputs
      changed_when: false

    - name: Display Terraform outputs
      debug:
        msg: "{{ terraform_outputs.stdout | from_json }}"